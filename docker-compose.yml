services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boogiebet
      POSTGRES_USER: boogiebet
      POSTGRES_PASSWORD: boogiebet
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boogiebet"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
