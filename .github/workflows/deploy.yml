name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy production
    runs-on: [self-hosted, Linux, X64, prod-docker-01]
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      DEPLOY_PATH: /srv/boogiebet-bot
    steps:
      - name: Mark deploy path as safe for git
        run: sudo git config --system --add safe.directory "$DEPLOY_PATH"

      - name: Compute next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          LAST_TAG=$(
            git ls-remote --tags --refs "$REMOTE_URL" 'v*' \
              | awk -F/ '{print $3}' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n1
          )
          LAST_TAG=${LAST_TAG:-v1.0.0}
          if [[ "$LAST_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            NEXT_TAG="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((${BASH_REMATCH[3]}+1))"
          else
            NEXT_TAG="v1.0.1"
          fi
          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          # Write APP_VERSION into server .env so the container picks it up on start.
          touch "$DEPLOY_PATH/.env"
          sed -i '/^APP_VERSION=/d' "$DEPLOY_PATH/.env"
          echo "APP_VERSION=${NEXT_TAG}" >> "$DEPLOY_PATH/.env"
          echo "Next version: $NEXT_TAG"

      - name: Archive .env backup
        run: |
          set -euo pipefail
          BACKUP_DIR="$DEPLOY_PATH/backups/env"
          mkdir -p "$BACKUP_DIR"
          if [[ -f "$DEPLOY_PATH/.env" ]]; then
            cp "$DEPLOY_PATH/.env" "$BACKUP_DIR/.env.$(date -u +%Y-%m-%d_%H%M%S)"
            ls -t "$BACKUP_DIR"/.env.* 2>/dev/null | tail -n +11 | xargs -r rm --
          fi

      - name: Normalize deploy worktree
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          git reset --hard HEAD
          git clean -fd

      - name: Git sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --prune "$REMOTE_URL" \
            "+refs/heads/${{ github.ref_name }}:refs/remotes/origin/${{ github.ref_name }}" \
            "+refs/tags/*:refs/tags/*"
          git checkout --force --detach "${{ github.sha }}"
          git reset --hard "${{ github.sha }}"
          git clean -fd

      - name: Run tests
        run: |
          set -euo pipefail
          TEST_NET=boogiebet-testnet-$$
          TEST_DB=boogiebet-testdb-$$

          docker network create "$TEST_NET"

          docker run -d --name "$TEST_DB" --network "$TEST_NET" \
            -e POSTGRES_DB=boogiebet \
            -e POSTGRES_USER=boogiebet \
            -e POSTGRES_PASSWORD=boogiebet \
            postgres:16-alpine

          cleanup() {
            docker rm -f "$TEST_DB" 2>/dev/null || true
            docker network rm "$TEST_NET" 2>/dev/null || true
          }
          trap cleanup EXIT

          until docker exec "$TEST_DB" pg_isready -U boogiebet -q; do sleep 1; done
          docker exec -i "$TEST_DB" psql -U boogiebet -d boogiebet \
            < "$DEPLOY_PATH/init.sql"

          docker run --rm \
            --network "$TEST_NET" \
            -e DATABASE_URL="postgresql://boogiebet:boogiebet@${TEST_DB}/boogiebet" \
            -v "$DEPLOY_PATH:/app" \
            -w /app \
            python:3.12-slim \
            sh -c "pip install -q -r requirements-dev.txt && python3 -m pytest tests/ -v"

      - name: Docker build and deploy
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          docker compose build bot
          docker compose up -d db bot
          docker image prune -f

      - name: Tag release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT_TAG="${{ steps.version.outputs.tag }}"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            -d "{\"ref\":\"refs/tags/${NEXT_TAG}\",\"sha\":\"${{ github.sha }}\"}")
          if [[ "$HTTP" == "201" ]]; then
            echo "Tagged release: $NEXT_TAG"
          elif [[ "$HTTP" == "422" ]]; then
            echo "Tag $NEXT_TAG already exists — skipping."
          else
            echo "Warning: tag push returned HTTP $HTTP" >&2
          fi
